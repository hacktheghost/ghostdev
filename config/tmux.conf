# ghostdev tmux config — sensible defaults for a browser terminal.
# Reload:  prefix + r   ·   default prefix: Ctrl-b

# --- Terminal & color ---
set -g default-terminal "tmux-256color"
set -ag terminal-overrides ",*256col*:RGB"   # true color (24-bit)
set -sg escape-time 10                        # no ESC delay (vim, etc.)
set -g focus-events on
set -g set-clipboard on                       # copy to the OS clipboard (OSC52)

# --- Big scrollback ---
set -g history-limit 50000

# --- Mouse ---
set -g mouse on                               # scroll, select pane, resize

# --- 1-based indices, renumber on close ---
set -g base-index 1
setw -g pane-base-index 1
set -g renumber-windows on

# --- vi-style copy mode ---
setw -g mode-keys vi
bind -T copy-mode-vi v send -X begin-selection
bind -T copy-mode-vi y send -X copy-selection-and-cancel
bind -T copy-mode-vi Escape send -X cancel
bind Enter copy-mode                          # prefix+Enter enters copy-mode

# --- Quick reload ---
bind r source-file ~/.tmux.conf \; display-message "tmux.conf reloaded ✔"

# --- Splits keep the current directory ---
bind | split-window -h -c "#{pane_current_path}"
bind - split-window -v -c "#{pane_current_path}"
bind c new-window -c "#{pane_current_path}"

# --- Navigate panes with Alt+arrows (no prefix) ---
bind -n M-Left  select-pane -L
bind -n M-Right select-pane -R
bind -n M-Up    select-pane -U
bind -n M-Down  select-pane -D

# --- Resize panes with prefix + H/J/K/L (repeatable) ---
bind -r H resize-pane -L 5
bind -r J resize-pane -D 5
bind -r K resize-pane -U 5
bind -r L resize-pane -R 5

# --- Misc ---
set -g display-time 2000                      # messages visible 2s
set -g display-panes-time 2000
setw -g aggressive-resize on

# --- Status bar (sober, dark) ---
set -g status-style "bg=colour234,fg=colour250"
set -g status-left-length 30
set -g status-left "#[bg=colour39,fg=colour234,bold] #S #[bg=colour234,fg=colour39]"
set -g status-right "#[fg=colour245]#H #[bg=colour39,fg=colour234,bold] %d-%m %H:%M "
set -g status-justify left
setw -g window-status-current-style "bg=colour39,fg=colour234,bold"
setw -g window-status-current-format " #I:#W "
setw -g window-status-format " #I:#W "
