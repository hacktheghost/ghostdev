services:
  ghostdev:
    build: .
    image: ghostdev:latest
    container_name: ghostdev
    restart: unless-stopped
    env_file: .env
    # SAFE DEFAULT: bound to localhost only. A web terminal is a remote shell — do NOT
    # expose it directly to the internet. Put a reverse proxy + auth in front and only
    # then change the host address. See docs/SECURITY.md and docs/reverse-proxy.md.
    ports:
      - "${GHOSTDEV_HOST_ADDR:-127.0.0.1}:${GHOSTDEV_HOST_PORT:-7680}:7680"
    volumes:
      # Persists $HOME: tmux sessions config, shell history, and your Claude Code login.
      - ghostdev-home:/home/ghost
    healthcheck:
      test: ["CMD", "curl", "-fsS", "http://127.0.0.1:7680/"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s

volumes:
  ghostdev-home:
