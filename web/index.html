<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<title>GHOST.dev — terminal</title>
<link rel="icon" type="image/png" href="ghost-mark.png">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@500;700&family=JetBrains+Mono:wght@400;600&display=swap" rel="stylesheet">
<style>
  :root{
    --void:#07080B; --ink:#0F1117; --slate-900:#161922; --slate-800:#1D212C;
    --slate-700:#262B38; --slate-600:#2A2F3C; --slate-500:#3A4150; --slate-300:#707A8E;
    --slate-200:#9AA3B5; --slate-100:#C7CDDA; --slate-50:#E6E9F0; --ghost-white:#F5F7FC;
    --accent:#3DE3A0; --accent-hover:#5CEAB0; --accent-soft:rgba(61,227,160,0.12);
    --phantom-glow:rgba(61,227,160,0.45); --spectre:#9C8CFF; --danger:#FF5C6C; --warn:#F5B544;
    --font-display:'Space Grotesk',system-ui,sans-serif;
    --font-mono:'JetBrains Mono','Hack',Menlo,Consolas,monospace;
    --border:var(--slate-600); --radius:10px;
  }
  *{box-sizing:border-box}
  html,body{height:100%;margin:0}
  body{
    background:var(--ink);
    background-image:radial-gradient(120% 90% at 50% -20%, rgba(61,227,160,0.07), transparent 55%),
      radial-gradient(rgba(255,255,255,0.025) 1px, transparent 1px);
    background-size:auto, 22px 22px;
    color:var(--slate-50); font-family:var(--font-display);
    display:flex; flex-direction:column; overflow:hidden;
  }
  .ghost{filter:drop-shadow(0 0 9px var(--phantom-glow))}
  /* ---- header: single row, no wrap ---- */
  header.topbar{
    height:52px; flex:none; display:flex; align-items:center; justify-content:space-between; gap:16px;
    padding:0 18px; border-bottom:1px solid var(--border); background:rgba(7,8,11,0.65);
    backdrop-filter:blur(6px); overflow:hidden;
  }
  .brand{display:flex; align-items:center; gap:10px; flex:none}
  .brand .ghost{width:25px;height:25px}
  .brand .wm{font-weight:700; font-size:18px; letter-spacing:.04em; color:var(--ghost-white)}
  .brand .wm b{color:var(--accent); font-weight:700}
  .brand .tag{font-family:var(--font-mono); font-size:10.5px; letter-spacing:.12em; text-transform:uppercase;
    color:var(--accent); border:1px solid var(--slate-600); border-radius:6px; padding:2px 7px; margin-left:4px}
  .topbar .right{display:flex; align-items:center; gap:14px; flex:none; font-family:var(--font-mono); font-size:12px; min-width:0}
  .ips{display:flex; gap:12px; color:var(--slate-400); white-space:nowrap}
  .ips b{color:var(--slate-200); font-weight:500}
  .clock{color:var(--ghost-white); font-weight:600; font-size:13px; letter-spacing:.06em;
    border:1px solid var(--border); border-radius:8px; padding:4px 10px; background:var(--slate-900); flex:none}
  /* ---- status bar: horizontal scroll, never wrap ---- */
  .statusbar{
    height:34px; flex:none; display:flex; align-items:center; gap:16px;
    padding:0 18px; border-bottom:1px solid var(--border); background:var(--void);
    font-family:var(--font-mono); font-size:12px; color:var(--slate-300);
    overflow-x:auto; white-space:nowrap;
  }
  .statusbar::-webkit-scrollbar{height:0}
  .statusbar .grp{display:inline-flex; align-items:center; gap:11px; flex:none}
  .statusbar .lbl{color:var(--slate-500); letter-spacing:.12em; font-size:11px; text-transform:lowercase}
  .statusbar .stat{color:var(--slate-400)}
  .statusbar .stat b{font-weight:600; color:var(--accent); margin-left:4px}
  .statusbar .stat b.warn{color:#F5B544}
  .statusbar .stat b.danger{color:var(--danger)}
  .statusbar .vsep{width:1px; height:15px; background:var(--slate-600); flex:none}
  @media (max-width:680px){ .ips{display:none} }
  @keyframes pulse{0%{box-shadow:0 0 0 0 var(--phantom-glow)}70%{box-shadow:0 0 0 7px transparent}100%{box-shadow:0 0 0 0 transparent}}
  /* ---- tab strip ---- */
  .tabstrip{height:42px; flex:none; display:flex; align-items:stretch; gap:4px; padding:6px 10px 0; border-bottom:1px solid var(--border); background:var(--void); overflow-x:auto}
  .tab{
    display:flex; align-items:center; gap:8px; padding:0 10px 0 13px; height:34px;
    border:1px solid transparent; border-bottom:none; border-radius:9px 9px 0 0;
    background:transparent; color:var(--slate-300); cursor:pointer; white-space:nowrap;
    font-family:var(--font-mono); font-size:12.5px; max-width:240px;
  }
  .tab:hover{color:var(--slate-100); background:var(--slate-900)}
  .tab.active{background:var(--ink); color:var(--accent); border-color:var(--border); box-shadow:inset 0 2px 0 var(--accent)}
  /* ---- per-tab Claude session state ---- */
  .tab .st{width:7px;height:7px;border-radius:50%;background:var(--slate-600);flex:none;transition:background .25s,box-shadow .25s}
  .tab.st-busy .st{background:var(--slate-300)}
  .tab.st-input .st{background:var(--accent);box-shadow:0 0 7px var(--accent)}
  .tab.st-perms .st{background:var(--warn);animation:pulseWarn 1.3s infinite}
  .tab.st-ended .st{background:var(--slate-600);box-shadow:none}
  .tab.st-input:not(.active) .nm{color:var(--accent)}
  .tab.st-perms:not(.active){border-color:rgba(245,181,68,.45)}
  .tab.st-perms:not(.active) .nm{color:var(--warn)}
  .tab.st-ended:not(.active){opacity:.5}
  @keyframes pulseWarn{0%{box-shadow:0 0 0 0 rgba(245,181,68,.55)}70%{box-shadow:0 0 0 6px transparent}100%{box-shadow:0 0 0 0 transparent}}
  .tab .nm{overflow:hidden; text-overflow:ellipsis}
  .tab .close{width:16px;height:16px;border-radius:4px;display:grid;place-items:center;opacity:.55}
  .tab .close:hover{opacity:1;background:var(--slate-700);color:var(--danger)}
  .tab .close svg{width:11px;height:11px}
  .addbtn{
    flex:none; width:34px; height:34px; margin-left:2px; border-radius:9px; border:1px dashed var(--slate-500);
    background:transparent; color:var(--slate-300); cursor:pointer; display:grid; place-items:center;
  }
  .addbtn:hover{color:var(--accent); border-color:var(--accent); background:var(--accent-soft)}
  .addbtn svg{width:15px;height:15px}
  /* ---- "closed" button (live sessions not opened as a tab) ---- */
  .closedbtn{
    flex:none; height:34px; margin-left:auto; padding:0 11px; border-radius:9px;
    border:1px solid var(--slate-600); background:transparent; color:var(--slate-300);
    cursor:pointer; display:inline-flex; align-items:center; gap:7px; white-space:nowrap;
    font-family:var(--font-mono); font-size:12px;
  }
  .closedbtn:hover{color:var(--slate-100); border-color:var(--slate-500); background:var(--slate-900)}
  .closedbtn svg{width:14px;height:14px}
  .closedbtn .badge{min-width:17px; height:17px; padding:0 5px; border-radius:9px; background:var(--slate-700);
    color:var(--slate-100); font-size:10.5px; display:inline-grid; place-items:center}
  .closedbtn .badge.has{background:var(--accent-soft); color:var(--accent)}
  /* ---- closed-sessions drawer ---- */
  .drawer{
    position:absolute; right:10px; top:128px; z-index:40; width:300px; max-width:calc(100vw - 20px);
    max-height:60vh; overflow-y:auto; -webkit-overflow-scrolling:touch;
    background:var(--slate-900); border:1px solid var(--border); border-radius:12px;
    box-shadow:0 16px 40px rgba(0,0,0,.55); padding:8px; display:none;
  }
  .drawer.show{display:block}
  .drawer .dh{font-family:var(--font-mono); font-size:10.5px; letter-spacing:.12em; text-transform:uppercase;
    color:var(--slate-500); padding:6px 8px 8px}
  .drawer .row{display:flex; align-items:center; gap:8px; padding:7px 8px; border-radius:8px}
  .drawer .row:hover{background:var(--slate-800)}
  .drawer .row .dot{width:6px; height:6px; border-radius:50%; background:var(--slate-500); flex:none}
  .drawer .row .dot.on{background:var(--accent)}
  .drawer .row .rn{flex:1; min-width:0; overflow:hidden; text-overflow:ellipsis; white-space:nowrap;
    font-family:var(--font-mono); font-size:12.5px; color:var(--slate-100)}
  .drawer .row .w{font-family:var(--font-mono); font-size:10.5px; color:var(--slate-500); flex:none}
  .drawer .row button{flex:none; width:26px; height:26px; border-radius:7px; border:1px solid transparent;
    background:transparent; cursor:pointer; display:grid; place-items:center; color:var(--slate-300)}
  .drawer .row .reopen:hover{color:var(--accent); background:var(--accent-soft)}
  .drawer .row .kill:hover{color:var(--danger); background:var(--slate-700)}
  .drawer .row button svg{width:14px; height:14px}
  .drawer .none{padding:14px 8px; text-align:center; color:var(--slate-500); font-family:var(--font-mono); font-size:11.5px}
  /* ---- terminal area ---- */
  .stage{flex:1; min-height:0; position:relative; background:var(--ink)}
  .pane{position:absolute; inset:0; border:0; width:100%; height:100%; display:none; background:var(--ink)}
  .pane.active{display:block}
  .empty{position:absolute; inset:0; display:none; place-items:center; text-align:center; color:var(--slate-300)}
  .empty.show{display:grid}
  .empty .ghost{width:60px;height:60px;opacity:.6;margin-bottom:14px}
  .empty .t{font-size:16px;color:var(--slate-100)}
  .empty .m{font-family:var(--font-mono);font-size:12px;margin-top:6px}
  ::-webkit-scrollbar{height:8px;width:8px}
  ::-webkit-scrollbar-thumb{background:var(--slate-600);border-radius:8px}
</style>
</head>
<body>
  <header class="topbar">
    <div class="brand">
      <img class="ghost" src="ghost-mark.png" alt="" aria-hidden="true">
      <span class="wm">GHOST<b>.dev</b></span>
      <span class="tag" id="node-tag">node</span>
    </div>
    <div class="right">
      <div class="ips">
        <span>node <b id="ip-ct">–</b></span>
        <span id="ip-host-wrap" style="display:none">host <b id="ip-host">–</b></span>
        <span id="ip-pub-wrap">wan <b id="ip-pub">–</b></span>
      </div>
      <div class="clock" id="clock">--:--:--</div>
    </div>
  </header>

  <div class="statusbar">
    <div class="grp">
      <span class="lbl">// node</span>
      <span class="stat">cpu <b id="ct-cpu">–</b></span>
      <span class="stat">mem <b id="ct-mem">–</b></span>
      <span class="stat">disk <b id="ct-disk">–</b></span>
    </div>
    <span class="vsep" id="host-sep" style="display:none"></span>
    <div class="grp" id="host-grp" style="display:none">
      <span class="lbl">// host</span>
      <span class="stat">cpu <b id="h-cpu">–</b></span>
      <span class="stat">mem <b id="h-mem">–</b></span>
      <span class="stat">disk <b id="h-disk">–</b></span>
    </div>
  </div>

  <nav class="tabstrip" id="tabstrip">
    <button class="addbtn" id="addbtn" title="New console">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><path d="M12 5v14M5 12h14"/></svg>
    </button>
    <button class="closedbtn" id="closedbtn" title="Closed sessions (still alive)">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="4" width="18" height="4" rx="1"/><path d="M5 8v11a1 1 0 0 0 1 1h12a1 1 0 0 0 1-1V8"/><path d="M10 12h4"/></svg>
      <span>closed</span><span class="badge" id="closedBadge">0</span>
    </button>
  </nav>

  <div class="drawer" id="drawer"></div>

  <div class="stage" id="stage">
    <div class="empty" id="empty">
      <div>
        <img class="ghost" src="ghost-mark.png" alt="" aria-hidden="true">
        <div class="t">Nothing haunting this node yet.</div>
        <div class="m">// press + to open a console</div>
      </div>
    </div>
  </div>

<script>
(function(){
  var stage=document.getElementById('stage');
  var strip=document.getElementById('tabstrip');
  var addbtn=document.getElementById('addbtn');
  var empty=document.getElementById('empty');
  var closedbtn=document.getElementById('closedbtn');
  var closedBadge=document.getElementById('closedBadge');
  var drawer=document.getElementById('drawer');
  var tabs=[]; var activeId=null; var seq=0;
  var LS='ghost.dev.tabs';

  function sessionName(n){ return ('g-'+n.toLowerCase().replace(/[^a-z0-9]+/g,'-').replace(/^-+|-+$/g,'')).slice(0,26) || ('g-'+seq); }
  function activeIndex(){ for(var i=0;i<tabs.length;i++) if(tabs[i].id===activeId) return i; return 0; }
  function save(){ try{ localStorage.setItem(LS, JSON.stringify({tabs:tabs.map(function(t){return {name:t.name,session:t.session};}),active:activeIndex()})); }catch(e){} }

  // ---- per-session Claude state -> tab color ----
  // busy=working · input=waiting for your message · perms=waiting for permission · ended=Claude exited
  var sstate={};
  function applyStates(){
    Array.prototype.forEach.call(strip.querySelectorAll('.tab'),function(el){
      var st=sstate[el.dataset.session]||'';
      el.classList.remove('st-busy','st-input','st-perms','st-ended');
      if(st) el.classList.add('st-'+st);
    });
    var attn=0;
    tabs.forEach(function(t){ var st=sstate[t.session]; if((st==='perms'||st==='input')&&t.id!==activeId) attn++; });
    document.title=(attn?'('+attn+') ':'')+'GHOST.dev — terminal';
  }
  function pollStates(){
    fetch('api/sessions',{cache:'no-store'}).then(function(r){return r.json();}).then(function(list){
      var m={}; (list||[]).forEach(function(x){ if(x.claude) m[x.name]=x.claude; });
      sstate=m; applyStates();
    }).catch(function(){});
  }
  setInterval(pollStates,3500);

  function closeIcon(){ return '<span class="close" title="Close"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.4" stroke-linecap="round"><path d="M6 6l12 12M18 6L6 18"/></svg></span>'; }

  function render(){
    Array.prototype.forEach.call(strip.querySelectorAll('.tab'),function(e){e.remove();});
    tabs.forEach(function(t){
      var el=document.createElement('div');
      el.className='tab'+(t.id===activeId?' active':'');
      el.dataset.session=t.session;
      el.innerHTML='<span class="st"></span><span class="nm">'+t.name.replace(/[<>&]/g,'')+'</span>'+closeIcon();
      el.addEventListener('click',function(ev){ if(ev.target.closest('.close')){closeTab(t.id);} else {activate(t.id);} });
      strip.insertBefore(el, addbtn);
    });
    empty.classList.toggle('show', tabs.length===0);
    applyStates();
    save();
  }
  function activate(id){
    activeId=id;
    Array.prototype.forEach.call(stage.querySelectorAll('.pane'),function(f){ f.classList.toggle('active', f.dataset.id==id); });
    render();
  }
  function addTab(name, session){
    var id=++seq;
    name=(name||('dev-'+id)).slice(0,30);
    session=session||sessionName(name);
    var f=document.createElement('iframe');
    f.className='pane'; f.dataset.id=id; f.dataset.session=session;
    f.src='tty/?arg='+encodeURIComponent(session);
    stage.appendChild(f);
    tabs.push({id:id,name:name,session:session});
    activate(id);
    refreshDrawer();
  }
  function closeTab(id){
    var i=tabs.findIndex(function(t){return t.id===id;});
    if(i<0) return;
    var f=stage.querySelector('.pane[data-id="'+id+'"]'); if(f) f.remove();
    tabs.splice(i,1);
    if(activeId===id){ var n=tabs[Math.max(0,i-1)]; activeId=n?n.id:null; }
    if(activeId) activate(activeId); else render();
    refreshDrawer();   // the session stays alive -> it will show up under "closed"
  }
  addbtn.addEventListener('click',function(){
    var n=prompt('Console name:', 'dev-'+(seq+1));
    if(n===null) return;
    n=(n||'').trim(); addTab(n||('dev-'+(seq+1)));
  });

  // ---- "closed" drawer: live tmux sessions not currently open as a tab ----
  function openSessionSet(){ var s={}; tabs.forEach(function(t){ s[t.session]=1; }); return s; }
  function dispName(sess){ return sess.replace(/^g-/,'') || sess; }
  function svgReopen(){ return '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M3 12a9 9 0 1 0 2.6-6.3L3 8"/><path d="M3 3v5h5"/></svg>'; }
  function svgKill(){ return '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M4 7h16M9 7V4h6v3M7 7l1 13h8l1-13"/></svg>'; }

  function renderDrawer(list){
    var open=openSessionSet();
    var closed=(list||[]).filter(function(x){ return !open[x.name]; });
    closedBadge.textContent=closed.length;
    closedBadge.className='badge'+(closed.length?' has':'');
    var html='<div class="dh">// live sessions, not open</div>';
    if(!closed.length){ html+='<div class="none">no closed sessions</div>'; }
    else closed.forEach(function(x){
      var safe=x.name.replace(/[^A-Za-z0-9_.-]/g,'');
      html+='<div class="row" data-s="'+safe+'">'
        +'<span class="dot'+(x.attached?' on':'')+'" title="'+(x.attached?'attached elsewhere':'detached')+'"></span>'
        +'<span class="rn">'+dispName(x.name).replace(/[<>&]/g,'')+'</span>'
        +'<span class="w">'+(x.windows||1)+'w</span>'
        +'<button class="reopen" title="Reopen">'+svgReopen()+'</button>'
        +'<button class="kill" title="Kill session">'+svgKill()+'</button>'
        +'</div>';
    });
    drawer.innerHTML=html;
    Array.prototype.forEach.call(drawer.querySelectorAll('.row'),function(row){
      var sess=row.getAttribute('data-s');
      row.querySelector('.reopen').addEventListener('click',function(){ addTab(dispName(sess), sess); drawer.classList.remove('show'); });
      row.querySelector('.kill').addEventListener('click',function(){
        if(!confirm('Kill session "'+sess+'"? Everything inside it will be lost.')) return;
        fetch('api/kill?s='+encodeURIComponent(sess),{cache:'no-store'})
          .then(function(r){return r.json();})
          .then(function(){ refreshDrawer(); })
          .catch(function(){ refreshDrawer(); });
      });
    });
  }
  function refreshDrawer(){
    fetch('api/sessions',{cache:'no-store'}).then(function(r){return r.json();})
      .then(renderDrawer).catch(function(){ renderDrawer([]); });
  }
  function toggleDrawer(){
    if(drawer.classList.contains('show')){ drawer.classList.remove('show'); return; }
    refreshDrawer(); drawer.classList.add('show');
  }
  closedbtn.addEventListener('click',function(e){ e.stopPropagation(); toggleDrawer(); });
  document.addEventListener('click',function(e){
    if(!drawer.contains(e.target) && !closedbtn.contains(e.target)) drawer.classList.remove('show');
  });

  var restored=false;
  try{
    var st=JSON.parse(localStorage.getItem(LS)||'null');
    if(st&&st.tabs&&st.tabs.length){
      st.tabs.forEach(function(t){ addTab(t.name,t.session); });
      var idx=st.active||0; if(tabs[idx]) activate(tabs[idx].id);
      restored=true;
    }
  }catch(e){}
  if(!restored) addTab('main','g-main');
  refreshDrawer();
  pollStates();
})();

// ---- live stats + clock ----
(function(){
  function $(id){return document.getElementById(id);}
  function tone(el,pct){ el.classList.remove('warn','danger'); if(pct>=85)el.classList.add('danger'); else if(pct>=65)el.classList.add('warn'); }
  function g(b){ return (b/1073741824).toFixed(b<10*1073741824?1:0)+'G'; }
  function setPair(id,o){ var el=$(id); if(!o){el.textContent='–';return;} var pct=o.total?Math.round(o.used/o.total*100):0; el.textContent=g(o.used)+'/'+g(o.total); tone(el,pct); }
  function setCpu(id,pct){ var el=$(id); el.textContent=(pct==null?'–':pct+'%'); tone(el,pct||0); }
  function show(id,on){ var el=$(id); if(el) el.style.display=on?'':'none'; }

  function clock(){ var d=new Date(); var p=function(n){return (n<10?'0':'')+n;}; $('clock').textContent=p(d.getHours())+':'+p(d.getMinutes())+':'+p(d.getSeconds()); }
  setInterval(clock,1000); clock();

  var labelSet=false;
  function poll(){
    fetch('api/stats',{cache:'no-store'}).then(function(r){return r.json();}).then(function(s){
      if(!labelSet && s.label){ $('node-tag').textContent=s.label; labelSet=true; }
      setCpu('ct-cpu',s.ct.cpu); setPair('ct-mem',s.ct.mem); setPair('ct-disk',s.ct.disk);
      var hasHost=s.host && !s.host.error;
      show('host-grp',hasHost); show('host-sep',hasHost);
      if(hasHost){ setCpu('h-cpu',s.host.cpu); setPair('h-mem',s.host.mem); setPair('h-disk',s.host.disk); }
      if(s.ips){
        if(s.ips.ct) $('ip-ct').textContent=s.ips.ct;
        var hostIp=s.ips.host; show('ip-host-wrap',!!hostIp); if(hostIp) $('ip-host').textContent=hostIp;
        var hasPub=Object.prototype.hasOwnProperty.call(s.ips,'public'); show('ip-pub-wrap',hasPub); if(hasPub) $('ip-pub').textContent=s.ips.public||'–';
      }
    }).catch(function(){});
  }
  poll(); setInterval(poll,3000);
})();
</script>
</body>
</html>
