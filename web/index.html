<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<title>GHOST.dev — terminal</title>
<link rel="icon" type="image/png" href="ghost-mark.png">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@500;700&family=JetBrains+Mono:wght@400;600&display=swap" rel="stylesheet">
<style>
  :root{
    --void:#07080B; --ink:#0F1117; --slate-900:#161922; --slate-800:#1D212C;
    --slate-700:#262B38; --slate-600:#2A2F3C; --slate-500:#3A4150; --slate-300:#707A8E;
    --slate-200:#9AA3B5; --slate-100:#C7CDDA; --slate-50:#E6E9F0; --ghost-white:#F5F7FC;
    --accent:#3DE3A0; --accent-hover:#5CEAB0; --accent-soft:rgba(61,227,160,0.12);
    --phantom-glow:rgba(61,227,160,0.45); --spectre:#9C8CFF; --danger:#FF5C6C; --warn:#F5B544;
    --font-display:'Space Grotesk',system-ui,sans-serif;
    --font-mono:'JetBrains Mono','Hack',Menlo,Consolas,monospace;
    --border:var(--slate-600); --radius:10px;
  }
  *{box-sizing:border-box}
  html,body{height:100%;margin:0}
  body{
    background:var(--ink);
    background-image:radial-gradient(120% 90% at 50% -20%, rgba(61,227,160,0.07), transparent 55%),
      radial-gradient(rgba(255,255,255,0.025) 1px, transparent 1px);
    background-size:auto, 22px 22px;
    color:var(--slate-50); font-family:var(--font-display);
    display:flex; flex-direction:column; overflow:hidden;
  }
  .ghost{filter:drop-shadow(0 0 9px var(--phantom-glow))}
  /* ---- header ---- */
  header.topbar{
    height:52px; flex:none; display:flex; align-items:center; justify-content:space-between; gap:16px;
    padding:0 18px; border-bottom:1px solid var(--border); background:rgba(7,8,11,0.65);
    backdrop-filter:blur(6px); overflow:hidden;
  }
  .brand{display:flex; align-items:center; gap:10px; flex:none}
  .brand .ghost{width:25px;height:25px}
  .brand .wm{font-weight:700; font-size:18px; letter-spacing:.04em; color:var(--ghost-white)}
  .brand .wm b{color:var(--accent); font-weight:700}
  .brand .tag{font-family:var(--font-mono); font-size:10.5px; letter-spacing:.12em; text-transform:uppercase;
    color:var(--accent); border:1px solid var(--slate-600); border-radius:6px; padding:2px 7px; margin-left:4px}
  .topbar .right{display:flex; align-items:center; gap:12px; flex:none; font-family:var(--font-mono); font-size:12px; min-width:0}
  .ips{display:flex; gap:12px; color:var(--slate-400); white-space:nowrap}
  .ips b{color:var(--slate-200); font-weight:500}
  .iconbtn{flex:none; width:30px; height:30px; border-radius:8px; border:1px solid var(--border);
    background:var(--slate-900); color:var(--slate-300); cursor:pointer; display:grid; place-items:center}
  .iconbtn:hover{color:var(--accent); border-color:var(--accent)}
  .iconbtn.on{color:var(--accent); border-color:var(--accent); background:var(--accent-soft)}
  .iconbtn svg{width:15px;height:15px}
  .langsel{appearance:none; font-family:var(--font-mono); font-size:11px; color:var(--slate-200);
    background:var(--slate-900); border:1px solid var(--border); border-radius:8px; padding:5px 7px; cursor:pointer}
  .langsel:hover{border-color:var(--accent)}
  .clock{color:var(--ghost-white); font-weight:600; font-size:13px; letter-spacing:.06em;
    border:1px solid var(--border); border-radius:8px; padding:4px 10px; background:var(--slate-900); flex:none}
  /* ---- status bar ---- */
  .statusbar{
    height:34px; flex:none; display:flex; align-items:center; gap:16px;
    padding:0 18px; border-bottom:1px solid var(--border); background:var(--void);
    font-family:var(--font-mono); font-size:12px; color:var(--slate-300);
    overflow-x:auto; white-space:nowrap;
  }
  .statusbar::-webkit-scrollbar{height:0}
  .statusbar .grp{display:inline-flex; align-items:center; gap:11px; flex:none}
  .statusbar .lbl{color:var(--slate-500); letter-spacing:.12em; font-size:11px; text-transform:lowercase}
  .statusbar .stat{color:var(--slate-400)}
  .statusbar .stat b{font-weight:600; color:var(--accent); margin-left:4px}
  .statusbar .stat b.warn{color:#F5B544}
  .statusbar .stat b.danger{color:var(--danger)}
  .statusbar .vsep{width:1px; height:15px; background:var(--slate-600); flex:none}
  @media (max-width:680px){ .ips{display:none} }
  /* ---- tab strip ---- */
  .tabstrip{height:42px; flex:none; display:flex; align-items:stretch; gap:4px; padding:6px 10px 0; border-bottom:1px solid var(--border); background:var(--void); overflow-x:auto}
  .tab{
    display:flex; align-items:center; gap:8px; padding:0 10px 0 13px; height:34px;
    border:1px solid transparent; border-bottom:none; border-radius:9px 9px 0 0;
    background:transparent; color:var(--slate-300); cursor:pointer; white-space:nowrap;
    font-family:var(--font-mono); font-size:12.5px; max-width:240px;
  }
  .tab:hover{color:var(--slate-100); background:var(--slate-900)}
  .tab.active{background:var(--ink); color:var(--accent); border-color:var(--border); box-shadow:inset 0 2px 0 var(--accent)}
  .tab .st{width:7px;height:7px;border-radius:50%;background:var(--slate-600);flex:none;transition:background .25s,box-shadow .25s}
  .tab.st-busy .st{background:var(--slate-300)}
  .tab.st-input .st{background:var(--accent);box-shadow:0 0 7px var(--accent)}
  .tab.st-perms .st{background:var(--warn);animation:pulseWarn 1.3s infinite}
  .tab.st-ended .st{background:var(--slate-600);box-shadow:none}
  .tab.st-input:not(.active) .nm{color:var(--accent)}
  .tab.st-perms:not(.active){border-color:rgba(245,181,68,.45)}
  .tab.st-perms:not(.active) .nm{color:var(--warn)}
  .tab.st-ended:not(.active){opacity:.5}
  @keyframes pulseWarn{0%{box-shadow:0 0 0 0 rgba(245,181,68,.55)}70%{box-shadow:0 0 0 6px transparent}100%{box-shadow:0 0 0 0 transparent}}
  .tab .nm{overflow:hidden; text-overflow:ellipsis}
  .tab .close{width:16px;height:16px;border-radius:4px;display:grid;place-items:center;opacity:.55}
  .tab .close:hover{opacity:1;background:var(--slate-700);color:var(--danger)}
  .tab .close svg{width:11px;height:11px}
  .addbtn{flex:none; width:34px; height:34px; margin-left:2px; border-radius:9px; border:1px dashed var(--slate-500);
    background:transparent; color:var(--slate-300); cursor:pointer; display:grid; place-items:center}
  .addbtn:hover{color:var(--accent); border-color:var(--accent); background:var(--accent-soft)}
  .addbtn svg{width:15px;height:15px}
  .closedbtn{flex:none; height:34px; margin-left:auto; padding:0 11px; border-radius:9px;
    border:1px solid var(--slate-600); background:transparent; color:var(--slate-300);
    cursor:pointer; display:inline-flex; align-items:center; gap:7px; white-space:nowrap;
    font-family:var(--font-mono); font-size:12px}
  .closedbtn:hover{color:var(--slate-100); border-color:var(--slate-500); background:var(--slate-900)}
  .closedbtn svg{width:14px;height:14px}
  .closedbtn .badge{min-width:17px; height:17px; padding:0 5px; border-radius:9px; background:var(--slate-700);
    color:var(--slate-100); font-size:10.5px; display:inline-grid; place-items:center}
  .closedbtn .badge.has{background:var(--accent-soft); color:var(--accent)}
  .drawer{position:absolute; right:10px; top:128px; z-index:40; width:300px; max-width:calc(100vw - 20px);
    max-height:60vh; overflow-y:auto; -webkit-overflow-scrolling:touch;
    background:var(--slate-900); border:1px solid var(--border); border-radius:12px;
    box-shadow:0 16px 40px rgba(0,0,0,.55); padding:8px; display:none}
  .drawer.show{display:block}
  .drawer .dh{font-family:var(--font-mono); font-size:10.5px; letter-spacing:.12em; text-transform:uppercase;
    color:var(--slate-500); padding:6px 8px 8px}
  .drawer .row{display:flex; align-items:center; gap:8px; padding:7px 8px; border-radius:8px}
  .drawer .row:hover{background:var(--slate-800)}
  .drawer .row .dot{width:6px; height:6px; border-radius:50%; background:var(--slate-500); flex:none}
  .drawer .row .dot.on{background:var(--accent)}
  .drawer .row .rn{flex:1; min-width:0; overflow:hidden; text-overflow:ellipsis; white-space:nowrap;
    font-family:var(--font-mono); font-size:12.5px; color:var(--slate-100)}
  .drawer .row .w{font-family:var(--font-mono); font-size:10.5px; color:var(--slate-500); flex:none}
  .drawer .row button{flex:none; width:26px; height:26px; border-radius:7px; border:1px solid transparent;
    background:transparent; cursor:pointer; display:grid; place-items:center; color:var(--slate-300)}
  .drawer .row .reopen:hover{color:var(--accent); background:var(--accent-soft)}
  .drawer .row .kill:hover{color:var(--danger); background:var(--slate-700)}
  .drawer .row button svg{width:14px; height:14px}
  .drawer .none{padding:14px 8px; text-align:center; color:var(--slate-500); font-family:var(--font-mono); font-size:11.5px}
  /* ---- workspace: file panel + terminal stage ---- */
  .workspace{flex:1; min-height:0; display:flex}
  #filepanel{flex:none; width:0; overflow:hidden; border-right:1px solid var(--border); background:var(--void);
    display:flex; flex-direction:column; transition:width .18s ease}
  body.fp-open #filepanel{width:320px}
  @media (max-width:560px){ body.fp-open #filepanel{width:100%} }
  .fp-head{flex:none; display:flex; align-items:center; gap:8px; padding:9px 10px; border-bottom:1px solid var(--border)}
  .fp-head .fp-title{font-family:var(--font-mono); font-size:12px; color:var(--accent); letter-spacing:.08em; flex:1}
  .fp-head button{width:28px;height:28px;border-radius:7px;border:1px solid var(--border);background:var(--slate-900);
    color:var(--slate-300);cursor:pointer;display:grid;place-items:center}
  .fp-head button:hover{color:var(--accent);border-color:var(--accent)}
  .fp-head button svg{width:14px;height:14px}
  .fp-path{flex:none; padding:7px 11px; font-family:var(--font-mono); font-size:11px; color:var(--slate-300);
    border-bottom:1px solid var(--border); white-space:nowrap; overflow-x:auto}
  .fp-path .seg{cursor:pointer; color:var(--slate-300)} .fp-path .seg:hover{color:var(--accent)}
  .fp-path .sep{color:var(--slate-600); margin:0 3px}
  .fp-ro{color:var(--warn); margin-left:6px; font-size:10px}
  .fp-actions{flex:none; display:flex; gap:6px; padding:8px 10px; border-bottom:1px solid var(--border); flex-wrap:wrap}
  .fp-actions button{font-family:var(--font-mono); font-size:11px; color:var(--slate-200); background:var(--slate-900);
    border:1px solid var(--border); border-radius:7px; padding:5px 8px; cursor:pointer; display:inline-flex; align-items:center; gap:5px}
  .fp-actions button:hover{color:var(--accent); border-color:var(--accent)}
  .fp-actions button svg{width:12px;height:12px}
  .fp-list{flex:1; min-height:0; overflow-y:auto; padding:6px}
  .fp-list.drag{outline:2px dashed var(--accent); outline-offset:-6px; background:var(--accent-soft)}
  .fp-row{display:flex; align-items:center; gap:8px; padding:6px 8px; border-radius:8px; cursor:pointer}
  .fp-row:hover{background:var(--slate-900)}
  .fp-row .fi{width:15px;height:15px;flex:none;color:var(--slate-400)}
  .fp-row.dir .fi{color:var(--accent)}
  .fp-row .fn{flex:1; min-width:0; overflow:hidden; text-overflow:ellipsis; white-space:nowrap;
    font-family:var(--font-mono); font-size:12px; color:var(--slate-100)}
  .fp-row .fz{font-family:var(--font-mono); font-size:10px; color:var(--slate-500); flex:none}
  .fp-row .acts{display:none; gap:2px; flex:none}
  .fp-row:hover .acts{display:flex}
  .fp-row .acts button{width:24px;height:24px;border-radius:6px;border:0;background:transparent;color:var(--slate-400);cursor:pointer;display:grid;place-items:center}
  .fp-row .acts button:hover{color:var(--accent);background:var(--slate-800)}
  .fp-row .acts button.del:hover{color:var(--danger)}
  .fp-row .acts button svg{width:13px;height:13px}
  .fp-empty{padding:16px 8px; text-align:center; color:var(--slate-500); font-family:var(--font-mono); font-size:11.5px}
  .fp-toast{flex:none; padding:6px 11px; font-family:var(--font-mono); font-size:11px; color:var(--accent); border-top:1px solid var(--border); min-height:0; display:none}
  .fp-toast.show{display:block}
  .fp-toast.err{color:var(--danger)}
  /* ---- modal (text editor / image preview) ---- */
  .modal{position:fixed; inset:0; z-index:60; background:rgba(7,8,11,.7); display:none; align-items:center; justify-content:center; padding:24px}
  .modal.show{display:flex}
  .modal .box{background:var(--slate-900); border:1px solid var(--border); border-radius:12px; width:min(900px,100%);
    max-height:90vh; display:flex; flex-direction:column; overflow:hidden; box-shadow:0 20px 60px rgba(0,0,0,.6)}
  .modal .mh{display:flex; align-items:center; gap:10px; padding:10px 14px; border-bottom:1px solid var(--border)}
  .modal .mh .mt{flex:1; font-family:var(--font-mono); font-size:12.5px; color:var(--slate-100); overflow:hidden; text-overflow:ellipsis; white-space:nowrap}
  .modal .mh button{font-family:var(--font-mono); font-size:12px; border-radius:7px; padding:6px 12px; cursor:pointer; border:1px solid var(--border); background:var(--slate-900); color:var(--slate-200)}
  .modal .mh button.save{background:var(--accent); color:#07080B; border-color:var(--accent); font-weight:700}
  .modal .mh button:hover{border-color:var(--accent)}
  .modal textarea{flex:1; min-height:50vh; resize:none; border:0; background:var(--ink); color:var(--slate-50);
    font-family:var(--font-mono); font-size:13px; line-height:1.5; padding:14px; outline:none}
  .modal .imgwrap{padding:14px; overflow:auto; display:grid; place-items:center}
  .modal .imgwrap img{max-width:100%; max-height:78vh; border-radius:8px}
  /* ---- terminal area ---- */
  .stage{flex:1; min-height:0; position:relative; background:var(--ink)}
  .pane{position:absolute; inset:0; border:0; width:100%; height:100%; display:none; background:var(--ink)}
  .pane.active{display:block}
  .empty{position:absolute; inset:0; display:none; place-items:center; text-align:center; color:var(--slate-300)}
  .empty.show{display:grid}
  .empty .ghost{width:60px;height:60px;opacity:.6;margin-bottom:14px}
  .empty .t{font-size:16px;color:var(--slate-100)}
  .empty .m{font-family:var(--font-mono);font-size:12px;margin-top:6px}
  ::-webkit-scrollbar{height:8px;width:8px}
  ::-webkit-scrollbar-thumb{background:var(--slate-600);border-radius:8px}
</style>
</head>
<body>
  <header class="topbar">
    <div class="brand">
      <img class="ghost" src="ghost-mark.png" alt="" aria-hidden="true">
      <span class="wm">GHOST<b>.dev</b></span>
      <span class="tag" id="node-tag">node</span>
    </div>
    <div class="right">
      <button class="iconbtn" id="fpToggle" title="File explorer" style="display:none">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M3 7a2 2 0 0 1 2-2h4l2 2h8a2 2 0 0 1 2 2v8a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/></svg>
      </button>
      <select class="langsel" id="langsel" title="Language">
        <option value="en">EN</option><option value="es">ES</option><option value="pt">PT</option><option value="fr">FR</option>
      </select>
      <div class="ips">
        <span>node <b id="ip-ct">–</b></span>
        <span id="ip-host-wrap" style="display:none">host <b id="ip-host">–</b></span>
        <span id="ip-pub-wrap">wan <b id="ip-pub">–</b></span>
      </div>
      <div class="clock" id="clock">--:--:--</div>
    </div>
  </header>

  <div class="statusbar">
    <div class="grp">
      <span class="lbl">// node</span>
      <span class="stat">cpu <b id="ct-cpu">–</b></span>
      <span class="stat">mem <b id="ct-mem">–</b></span>
      <span class="stat">disk <b id="ct-disk">–</b></span>
    </div>
    <span class="vsep" id="host-sep" style="display:none"></span>
    <div class="grp" id="host-grp" style="display:none">
      <span class="lbl">// host</span>
      <span class="stat">cpu <b id="h-cpu">–</b></span>
      <span class="stat">mem <b id="h-mem">–</b></span>
      <span class="stat">disk <b id="h-disk">–</b></span>
    </div>
  </div>

  <nav class="tabstrip" id="tabstrip">
    <button class="addbtn" id="addbtn" data-i18n-title="newConsole" title="New console">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><path d="M12 5v14M5 12h14"/></svg>
    </button>
    <button class="closedbtn" id="closedbtn" data-i18n-title="closedTitle" title="Closed sessions (still alive)">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="4" width="18" height="4" rx="1"/><path d="M5 8v11a1 1 0 0 0 1 1h12a1 1 0 0 0 1-1V8"/><path d="M10 12h4"/></svg>
      <span data-i18n="closed">closed</span><span class="badge" id="closedBadge">0</span>
    </button>
  </nav>

  <div class="drawer" id="drawer"></div>

  <div class="workspace">
    <aside id="filepanel">
      <div class="fp-head">
        <span class="fp-title" data-i18n="files">Files</span>
        <button id="fpUp" data-i18n-title="up" title="Up"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M12 19V5M5 12l7-7 7 7"/></svg></button>
        <button id="fpRefresh" data-i18n-title="refresh" title="Refresh"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M3 12a9 9 0 1 0 2.6-6.3L3 8"/><path d="M3 3v5h5"/></svg></button>
        <button id="fpClose" data-i18n-title="close" title="Close"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round"><path d="M6 6l12 12M18 6L6 18"/></svg></button>
      </div>
      <div class="fp-path" id="fpPath"></div>
      <div class="fp-actions" id="fpActions">
        <button id="fpMkdir"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M3 7a2 2 0 0 1 2-2h4l2 2h8a2 2 0 0 1 2 2v8a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/><path d="M12 11v4M10 13h4"/></svg><span data-i18n="newFolder">New folder</span></button>
        <button id="fpUpload"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M12 19V8M7 12l5-5 5 5"/><path d="M5 21h14"/></svg><span data-i18n="upload">Upload</span></button>
        <button id="fpUrl"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M10 13a5 5 0 0 0 7 0l2-2a5 5 0 0 0-7-7l-1 1"/><path d="M14 11a5 5 0 0 0-7 0l-2 2a5 5 0 0 0 7 7l1-1"/></svg><span data-i18n="fromUrl">From URL</span></button>
      </div>
      <div class="fp-list" id="fpList"></div>
      <div class="fp-toast" id="fpToast"></div>
      <input type="file" id="fpFile" multiple hidden>
    </aside>

    <div class="stage" id="stage">
      <div class="empty" id="empty">
        <div>
          <img class="ghost" src="ghost-mark.png" alt="" aria-hidden="true">
          <div class="t" data-i18n="emptyTitle">Nothing haunting this node yet.</div>
          <div class="m" data-i18n="emptyHint">// press + to open a console</div>
        </div>
      </div>
    </div>
  </div>

  <div class="modal" id="fpModal"><div class="box" id="fpModalBox"></div></div>

<script>
(function(){
  // ===================== i18n =====================
  var I18N={

  function poll(){
    fetch('api/stats',{cache:'no-store'}).then(function(r){return r.json();}).then(function(s){
      if(!labelSet && s.label){ $('node-tag').textContent=s.label; labelSet=true; }
      if(!filesShown && s.files){ fpToggle.style.display=''; filesShown=true; }
      setCpu('ct-cpu',s.ct.cpu); setPair('ct-mem',s.ct.mem); setPair('ct-disk',s.ct.disk);
      var hasHost=s.host && !s.host.error; show('host-grp',hasHost); show('host-sep',hasHost);
      if(hasHost){ setCpu('h-cpu',s.host.cpu); setPair('h-mem',s.host.mem); setPair('h-disk',s.host.disk); }
      if(s.ips){
        if(s.ips.ct) $('ip-ct').textContent=s.ips.ct;
        var hostIp=s.ips.host; show('ip-host-wrap',!!hostIp); if(hostIp) $('ip-host').textContent=hostIp;
        var hasPub=Object.prototype.hasOwnProperty.call(s.ips,'public'); show('ip-pub-wrap',hasPub); if(hasPub) $('ip-pub').textContent=s.ips.public||'–';
      }
    }).catch(function(){});
  }
  poll(); setInterval(poll,3000);
})();
</script>
</body>
</html>
